# Alertmanager configuration for Star Office Bridge on sg01
# Severity-based routing: critical/warning/info → /alert webhook on bridge
# Inhibition rules suppress lower-severity alerts when critical fires

global:
  resolve_timeout: 5m

route:
  receiver: "bridge-info"
  group_by: ["alertname", "instance", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "bridge-critical"
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 30m

    - match:
        severity: warning
      receiver: "bridge-warning"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    - match:
        severity: info
      receiver: "bridge-info"
      group_wait: 1m
      group_interval: 5m
      repeat_interval: 12h

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "instance"]

  - source_match:
      severity: critical
    target_match:
      severity: info
    equal: ["alertname", "instance"]

  - source_match:
      severity: warning
    target_match:
      severity: info
    equal: ["alertname", "instance"]

receivers:
  - name: "bridge-critical"
    webhook_configs:
      - url: "http://127.0.0.1:4317/alert"
        send_resolved: true

  - name: "bridge-warning"
    webhook_configs:
      - url: "http://127.0.0.1:4317/alert"
        send_resolved: true

  - name: "bridge-info"
    webhook_configs:
      - url: "http://127.0.0.1:4317/alert"
        send_resolved: true
