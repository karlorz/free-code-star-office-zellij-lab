# Alertmanager configuration for Star Office Bridge on sg01
# Severity-based routing: critical → page on-call, warning → Slack, info → dashboards only

global:
  resolve_timeout: 5m

route:
  receiver: "bridge-default"
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical: page on-call immediately
    - match:
        severity: critical
      receiver: "bridge-critical"
      group_wait: 15s
      group_interval: 2m
      repeat_interval: 2h

    # Warning: Slack/email digest
    - match:
        severity: warning
      receiver: "bridge-warning"
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 12h

    # Info: dashboards only, no active notification
    - match:
        severity: info
      receiver: "bridge-info"
      group_wait: 5m
      group_interval: 30m
      repeat_interval: 24h

# Inhibition: suppress warnings when critical is already firing for same service
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["service", "alertname"]

receivers:
  - name: "bridge-default"
    webhook_configs:
      - url: "http://127.0.0.1:4317/alert"
        send_resolved: true
        max_alerts: 50

  - name: "bridge-critical"
    webhook_configs:
      - url: "http://127.0.0.1:4317/alert"
        send_resolved: true
        max_alerts: 50
    # Add Slack/email/PagerDuty here for production

  - name: "bridge-warning"
    webhook_configs:
      - url: "http://127.0.0.1:4317/alert"
        send_resolved: true
        max_alerts: 50

  - name: "bridge-info"
    webhook_configs:
      - url: "http://127.0.0.1:4317/alert"
        send_resolved: true
        max_alerts: 50
